<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Georgia', serif;
      background-color: #f7f4f1;
      margin: 0;
      color: #5a4a42;
    }

    header {
      text-align: center;
      padding: 40px;
      background-color: #e8ded6;
      header {
  text-align: center;
  padding: 60px 20px;
  background: #e8ded6;
  position: relative;
  overflow: hidden;
}

header::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: url("https://drive.google.com/uc?export=view&id=1r1p6KcDTtPxGaVc7sxG9Qc5OTHlF69Z");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  opacity: 0.15; /* 👈 efecto marca de agua */
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .content {
      padding: 15px;
      text-align: center;
    }

    .available { color: #7a9e7e; }
    .taken { color: #b85c5c; }

    button {
      padding: 10px;
      border: none;
      border-radius: 20px;
      background: #c8a27c;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
    }
  </style>
</head>

const container = document.getElementById("gifts");

function render() {
  container.innerHTML = "";

  gifts.forEach(gift => {
    const isTaken = localStorage.getItem("gift_" + gift.id);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${gift.image}">
      <div class="content">
        <h3>${gift.name}</h3>
        <p class="${isTaken ? 'taken' : 'available'}">
          ${isTaken ? "Reservado" : "Disponible"}
        </p>
        <button ${isTaken ? "disabled" : ""}>
          ${isTaken ? "Ya seleccionado" : "Seleccionar"}
        </button>
      </div>
    `;

    card.querySelector("button").onclick = async () => {
        const confirmar = confirm("¿Has seleccionado este producto?\n\n¿Deseas reservarlo?");

        if (!confirmar) return;

        await updateDoc(doc(db, "gifts", docSnap.id), {
          taken: true
        });

        alert("💛 ¡Gracias! Este regalo ha sido reservado.");

        window.open(gift.link, "_blank");
     
    };

    container.appendChild(card);
  });
}

render();
</script>
