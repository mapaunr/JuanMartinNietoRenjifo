    }

    header {
      text-align: center;
      padding: 40px;
      background-color: #e8ded6;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    img {
      width: 100%;
      height: 200px;
       object-fit: cover;
      background: #fff;
      padding: 10px;
    }

    .content {
      padding: 15px;
      text-align: center;
    }

    .available { color: #7a9e7e; }
    .taken { color: #b85c5c; }

    button {
      padding: 10px;
      border: none;
      border-radius: 20px;
      background: #c8a27c;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }
  </style>
</head>

 const container = document.getElementById("gifts");

  function renderGifts() {
    container.innerHTML = "";

    gifts.forEach(gift => {
      const isTaken = localStorage.getItem("gift_" + gift.id);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${gift.image}" alt="${gift.name}">
        <div class="card-content">
          <h3>${gift.name}</h3>
          <div class="status ${isTaken ? 'taken' : 'available'}">
            ${isTaken ? "Reservado" : "Disponible"}
          </div>
          <button ${isTaken ? "disabled" : ""} onclick="selectGift(${gift.id}, '${gift.link}')">
            ${isTaken ? "Ya seleccionado" : "Seleccionar"}
          </button>
        </div>
      `;

      container.appendChild(card);
    });
  }

  function selectGift(id, link) {
    localStorage.setItem("gift_" + id, "taken");
    window.open(link, "_blank");
    renderGifts();
  }

  renderGifts();
