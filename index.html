  onSnapshot(collection(db, "gifts"), (snapshot) => {
    const data = {};
    snapshot.forEach(doc => {
      data[doc.id] = doc.data();
    });
    renderGifts(data);
  });

  function renderGifts(data = {}) {
    container.innerHTML = "";

    gifts.forEach(gift => {
      const isTaken = data[gift.id]?.taken ?? gift.taken;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${gift.image}" 
             onerror="this.src='https://placehold.co/300x200?text=Regalo'">
        <div class="card-content">
          <h3>${gift.name}</h3>
          <div class="status ${isTaken ? 'taken' : 'available'}">
            ${isTaken ? "Reservado" : "Disponible"}
          </div>

          <button ${isTaken ? "disabled" : ""} onclick="selectGift(${gift.id}, '${gift.link}')">
            ${isTaken ? "Ya seleccionado ✅" : "Seleccionar"}
          </button>

          ${isTaken ? `<button class="undo" onclick="releaseGift(${gift.id})">Liberar</button>` : ""}
        </div>
      `;

      container.appendChild(card);
    });
  }

  // 🔥 RESERVAR
  window.selectGift = async function(id, link) {
    const confirmar = confirm("¿Deseas reservar este regalo?");
    if (!confirmar) return;

    await setDoc(doc(db, "gifts", String(id)), {
      taken: true
    });

    window.open(link, "_blank");
  };

  // 🔥 LIBERAR (NUEVO)
 window.releaseGift = async function(id) {
  const confirmar = confirm("¿Deseas liberar este regalo?");
  if (!confirmar) return;

  await setDoc(doc(db, "gifts", String(id)), {
    taken: false,
    name: "",
    phone: ""
  }, { merge: true });
};
