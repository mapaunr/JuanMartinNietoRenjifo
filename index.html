<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista de Regalos Juan Martín</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Georgia', serif;
      background-color: #f7f4f1;
      margin: 0;
      color: #5a4a42;
    }

    header {
      text-align: center;
      padding: 40px;
      background-color: #e8ded6;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #fff;
      padding: 10px;
    }

    .card-content {
      padding: 18px;
      text-align: center;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .status {
      font-size: 14px;
      margin-bottom: 12px;
    }

    .available { 
      color: #7a9e7e; 
    }

    .taken { 
      color: #b85c5c; 
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: #c8a27c;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #b48d67;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

<header>
  <h1>Lista de Regalos</h1>
  <p>Baby Shower: Juan Martín Nieto Renjifo 🤍</p>
</header>

<div class="container" id="gifts"></div>

<!-- 🔥 FIREBASE + TU LÓGICA -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, onSnapshot } 
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA3i0Xm08OLJBxyDLFfLnf3kWyFsUtSpuU",
    authDomain: "baby-shower-juan-martin-7f0f0.firebaseapp.com",
    projectId: "baby-shower-juan-martin-7f0f0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const gifts = [
    {
    id: 1,
    name: "Gimnasio y Tapete",
    image: "https://m.media-amazon.com/images/I/41zdOKeh54L._SY300_SX300_QL70_FMwebp_.jpg",
    link: "https://www.amazon.com/baby-reg/catalina-renjifo-junio-2026-bogotaacute/3R0HURSXKC9P7"
  },
  {
    id: 2,
    name: "Tapete de juego plegable de espuma suave",
    image: "https://m.media-amazon.com/images/I/710Jw1KhrYL._SX679_.jpg",
    link: "https://www.amazon.com/baby-reg/catalina-renjifo-junio-2026-bogotaacute/3R0HURSXKC9P7"
  },
  {
    id: 3,
    name: "Pijama Térmico con Pies y Cremallera de 2 Vías ",
    image: "https://m.media-amazon.com/images/I/814W9suuXsL._AC_SY879_.jpg",
    link: "https://www.amazon.com/baby-reg/catalina-renjifo-junio-2026-bogotaacute/3R0HURSXKC9P7"
  },
  {
    id: 4,
    name: "Bolsa de dormir unisex para bebé",
    image: "https://m.media-amazon.com/images/I/71i2lVSNgiL._AC_SY300_SX300_QL70_FMwebp_.jpg",
    link: "https://www.amazon.com/baby-reg/catalina-renjifo-junio-2026-bogotaacute/3R0HURSXKC9P7"
  },
  {
    id: 5,
    name: "Bañera para bebés con mesa de cambio plegable",
    image: "https://m.media-amazon.com/images/I/71aSftw6iNL._SX679_.jpg",
    link: "https://www.amazon.com/baby-reg/catalina-renjifo-junio-2026-bogotaacute/3R0HURSXKC9P7"
  },
  {
    id: 6,
    name: "Bañera para bebé con soporte removible",
    image: "https://m.media-amazon.com/images/I/71Ho9D5xBgL._SX679_.jpg",
    link: "https://www.amazon.com/baby-reg/catalina-renjifo-junio-2026-bogotaacute/3R0HURSXKC9P7"
  },
  {
    id: 7,
    name: "Silla alta convertible 6 en 1 con balancín",
    image: "https://m.media-amazon.com/images/I/61h+GNbG4ML._SX679_.jpg",
    link: "https://www.amazon.com/baby-reg/catalina-renjifo-junio-2026-bogotaacute/3R0HURSXKC9P7"
  },
  {
    id: 8,
    name: "Silla alta de gancho, portátil y plegable",
    image: "https://m.media-amazon.com/images/I/71+dPqGvY9L._SX679_.jpg",
    link: "https://www.amazon.com/baby-reg/catalina-renjifo-junio-2026-bogotaacute/3R0HURSXKC9P7"
  },
  {
    id: 9,
    name: "Babero a prueba de suciedad Mangalarga",
    image: "https://m.media-amazon.com/images/I/715tizOD5XL._SX679_.jpg",
    link: "https://www.amazon.com/baby-reg/catalina-renjifo-junio-2026-bogotaacute/3R0HURSXKC9P7"
  }
];
 
  const container = document.getElementById("gifts");

  // 🔥 TIEMPO REAL
  onSnapshot(collection(db, "gifts"), (snapshot) => {
    const data = {};

    snapshot.forEach(doc => {
      data[doc.id] = doc.data();
    });

    renderGifts(data);
  });

  function renderGifts(data = {}) {
    container.innerHTML = "";

    gifts.forEach(gift => {
      const isTaken = data[gift.id]?.taken;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${gift.image}" alt="${gift.name}">
        <div class="card-content">
          <h3>${gift.name}</h3>
          <div class="status ${isTaken ? 'taken' : 'available'}">
            ${isTaken ? "Reservado" : "Disponible"}
          </div>
          <button ${isTaken ? "disabled" : ""} onclick="selectGift(${gift.id}, '${gift.link}')">
            ${isTaken ? "Ya seleccionado" : "Seleccionar"}
          </button>
        </div>
      `;

      container.appendChild(card);
    });
  }

  // 🔥 RESERVAR
  window.selectGift = async function(id, link) {
    const confirmar = confirm("¿Deseas reservar este regalo?");
    if (!confirmar) return;

    await setDoc(doc(db, "gifts", String(id)), {
      taken: true
    });

    window.open(link, "_blank");
  };
</script>

</body>
</html>
