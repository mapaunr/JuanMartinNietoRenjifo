      text-align: center;

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

    }

    .card {

      border-radius: 18px;

    }

    .card:hover {
      transform: translateY(-5px);
    }

    img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #fff;
      padding: 10px;
    }

    .card-content {
      padding: 18px;
      text-align: center;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .status {
      font-size: 14px;
      margin-bottom: 12px;
    }

    .available { 
      color: #7a9e7e; 
    }

    .taken { 
      color: #b85c5c; 
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: #c8a27c;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #b48d67;
    }

    button:disabled {

 const container = document.getElementById("gifts");

function renderGifts() {
  container.innerHTML = "";

  gifts.forEach(gift => {
    const isTaken = localStorage.getItem("gift_" + gift.id);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${gift.image}" alt="${gift.name}">
      <div class="card-content">
        <h3>${gift.name}</h3>
        <div class="status ${isTaken ? 'taken' : 'available'}">
          ${isTaken ? "Reservado" : "Disponible"}
        </div>
        <button ${isTaken ? "disabled" : ""} onclick="selectGift(${gift.id}, '${gift.link}')">
          ${isTaken ? "Ya seleccionado" : "Seleccionar"}
        </button>
      </div>
    `;

    container.appendChild(card);
  });
}

function selectGift(id, link) {
    // Confirmación antes de reservar
  const confirmar = confirm("¿Deseas reservar este regalo?");

  if (!confirmar) return;
// Abrir el link primero
  window.open(link, "_blank");
  localStorage.setItem("gift_" + id, "taken");

  renderGifts();
}
