<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baby Shower Juan Martín</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background-color: #f4efe9;
  color: #5c4432;
  margin: 0;
}

header {
  background-color: #c7a98b;
  color: white;
  text-align: center;
  padding: 30px;
}

h1 { margin: 0; }

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  display: flex;
  gap: 15px;
  align-items: center;
  box-shadow: 0 3px 8px rgba(0,0,0,0.05);
}

.card img {
  width: 80px;
  border-radius: 10px;
}

.info {
  flex: 1;
}

button {
  margin-top: 5px;
  margin-right: 5px;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.select {
  background: #a47551;
  color: white;
}

.amazon { background: #ff9900; color: white; }
.pepe { background: #6bbf59; color: white; }

.selected {
  opacity: 0.5;
  text-decoration: line-through;
}
</style>

</head>
<body>

<header>
  <h1>Baby Shower Juan Martín 🤎</h1>
  <p>Familia NIETO REJINFO</p>
</header>

<div class="container" id="list"></div>

<script>

const productos = [
{
  nombre: "Kit limpieza biberones",
  img: "https://m.media-amazon.com/images/I/61example.jpg",
  amazon: "https://www.amazon.com/",
  pepe: "https://www.pepeganga.com/"
},
{
  nombre: "Mochila pañalera",
  img: "https://m.media-amazon.com/images/I/71example.jpg",
  amazon: "https://www.amazon.com/",
  pepe: "https://www.pepeganga.com/"
},
{
  nombre: "Esterilizador de biberones",
  img: "https://m.media-amazon.com/images/I/61example2.jpg",
  amazon: "https://www.amazon.com/",
  pepe: "https://www.pepeganga.com/"
},
{
  nombre: "Muselinas",
  img: "https://m.media-amazon.com/images/I/61example3.jpg",
  amazon: "https://www.amazon.com/",
  pepe: "https://www.pepeganga.com/"
},
{
  nombre: "Silla alta",
  img: "https://m.media-amazon.com/images/I/71example4.jpg",
  amazon: "https://www.amazon.com/",
  pepe: "https://www.pepeganga.com/"
}
];

let selected = JSON.parse(localStorage.getItem("selected")) || [];

const list = document.getElementById("list");

function render(){
  list.innerHTML = "";

  productos.forEach((p, i)=>{
    let div = document.createElement("div");
    div.className = "card";

    if(selected.includes(i)) div.classList.add("selected");

    div.innerHTML = `
      <img src="${p.img}">
      <div class="info">
        <strong>${p.nombre}</strong><br>

        <button class="select" onclick="choose(${i})">
          ${selected.includes(i) ? "Elegido" : "Seleccionar"}
        </button>

        <br>

        <button class="amazon" onclick="window.open('${p.amazon}')">Amazon</button>
        <button class="pepe" onclick="window.open('${p.pepe}')">Pepe Ganga</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function choose(i){
  if(!selected.includes(i)){
    selected.push(i);
    localStorage.setItem("selected", JSON.stringify(selected));
    render();
  }
}

render();

</script>

</body>
</html>
